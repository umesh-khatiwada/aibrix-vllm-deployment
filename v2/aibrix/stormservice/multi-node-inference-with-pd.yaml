apiVersion: orchestration.aibrix.ai/v1alpha1
kind: StormService
metadata:
  name: tp-1p1d-mi300x
spec:
  replicas: 1
  updateStrategy:
    type: InPlaceUpdate
  stateful: true
  selector:
    matchLabels:
      app: tp-1p1d-mi300x
  template:
    metadata:
      labels:
        app: tp-1p1d-mi300x
    spec:
      roles:
        # ── Router ────────────────────────────────────────────────────────────
        - name: routing
          replicas: 1
          stateful: true
          template:
            spec:
              serviceAccountName: sglang-router-sa
              containers:
                - name: mini-lb
                  image: aibrix/sglang-router:v0.1.7-patch.1-20250731
                  # TODO: pin to a stable official release when available
                  command: ["sh", "-c"]
                  args:
                    - |
                      python3 -m sglang_router.launch_router \
                        --host 0.0.0.0 \
                        --pd-disaggregation \
                        --policy random \
                        --service-discovery \
                        --service-discovery-port 30000 \
                        --worker-startup-timeout-secs 900 \
                        --prefill-selector \
                          storm-service-name=$STORM_SERVICE_NAME \
                          role-name=prefill \
                          stormservice.orchestration.aibrix.ai/role-replica-index=0 \
                        --decode-selector \
                          storm-service-name=$STORM_SERVICE_NAME \
                          role-name=decode \
                          stormservice.orchestration.aibrix.ai/role-replica-index=0 \
                        --service-discovery-namespace default
                        # NOTE: --service-discovery-namespace is hardcoded to 'default'.
                        # Change this if deploying to a different namespace.

        # ── Prefill ───────────────────────────────────────────────────────────
        - name: prefill
          replicas: 1
          # podGroupSize omitted: prefill is single-pod (TP=1), no gang scheduling needed
          stateful: true
          template:
            metadata:
              labels:
                app: tp-1p1d-mi300x
                stormservice.orchestration.aibrix.ai/role-name: prefill
                stormservice.orchestration.aibrix.ai/storm-service-name: tp-1p1d-mi300x
                model.aibrix.ai/name: Llama-3.2-1B-Instruct
                model.aibrix.ai/port: "30000"
                model.aibrix.ai/engine: sglang
            spec:
              containers:
                - name: prefill
                  image: lmsysorg/sglang:v0.5.8-rocm700-mi30x
                  command: ["sh", "-c"]
                  args:
                    - |
                      python3 -m sglang.launch_server \
                        --model-path /models/Llama-3.2-1B-Instruct \
                        --served-model-name Llama-3.2-1B-Instruct \
                        --host 0.0.0.0 \
                        --port 30000 \
                        --disaggregation-mode prefill \
                        --disaggregation-transfer-backend mooncake \
                        --dtype bfloat16 \
                        --trust-remote-code \
                        --tp-size 1 \
                        --nnodes 1 \
                        --mem-fraction-static 0.8 \
                        --log-level debug
                  env:
                    # ── Networking ────────────────────────────────────────────
                    - name: GLOO_SOCKET_IFNAME
                      value: eth0
                    # Uncomment below if using InfiniBand:
                    # - name: NCCL_SOCKET_IFNAME
                    #   value: eth0
                    # - name: NCCL_IB_DISABLE
                    #   value: "0"
                    # - name: NCCL_IB_GID_INDEX
                    #   value: "7"
                    # - name: NCCL_DEBUG
                    #   value: "INFO"

                    # ── MI300X ROCm performance flags ─────────────────────────
                    - name: HSA_NO_SCRATCH_RECLAIM
                      value: "1"
                    - name: GPU_FORCE_BLIT_COPY_SIZE
                      value: "6"
                    - name: HIP_FORCE_DEV_KERNARG
                      value: "1"
                    - name: TORCH_BLAS_PREFER_HIPBLASLT
                      value: "1"

                  volumeMounts:
                    - name: model-vol
                      mountPath: /models
                      readOnly: true
                    - name: shared-mem
                      mountPath: /dev/shm

                  resources:
                    limits:
                      amd.com/gpu: 1

                  securityContext:
                    capabilities:
                      add:
                        - IPC_LOCK

              volumes:
                - name: model-vol
                  hostPath:
                    path: /data01/models
                    type: Directory
                  # WARNING: hostPath requires the model to be pre-staged at this
                  # path on every node the pod may schedule to. Consider a PVC for
                  # production to avoid silent failures on node rescheduling.
                - name: shared-mem
                  emptyDir:
                    medium: Memory

        # ── Decode (TP=2 across 2 nodes) ──────────────────────────────────────
        - name: decode
          replicas: 1
          podGroupSize: 2   # gang-schedule both decode pods together (all-or-nothing)
          stateful: true    # required for stable pod names used in rank/DNS derivation
          template:
            metadata:
              labels:
                app: tp-1p1d-mi300x
                stormservice.orchestration.aibrix.ai/role-name: decode
                stormservice.orchestration.aibrix.ai/storm-service-name: tp-1p1d-mi300x
                model.aibrix.ai/name: Llama-3.2-1B-Instruct
                model.aibrix.ai/port: "30000"
                model.aibrix.ai/engine: sglang
            spec:
              containers:
                - name: decode
                  image: lmsysorg/sglang:v0.5.8-rocm700-mi30x
                  command: ["sh", "-c"]
                  args:
                    - |
                      # ── Derive node rank from pod hostname ────────────────────
                      # Hostname format: <stormservice>-roleset-<id>-decode-<hash>-0-<RANK>
                      # The last dash-separated segment is the rank index.
                      NODE_RANK=$(echo $HOSTNAME | awk -F'-' '{print $NF}')
                      echo "[INFO] My hostname : $HOSTNAME"
                      echo "[INFO] My node rank: $NODE_RANK"

                      # ── Derive master (rank-0) DNS ────────────────────────────
                      # Replace the trailing rank digit with 0 to get rank-0 hostname.
                      MASTER_HOSTNAME=$(echo $HOSTNAME | sed 's/-[0-9]*$/-0/')
                      MASTER_DNS="${MASTER_HOSTNAME}.${STORM_SERVICE_NAME}.default.svc.cluster.local"
                      MASTER_PORT=29500
                      echo "[INFO] Master DNS  : $MASTER_DNS:$MASTER_PORT"

                      # ── Wait for rank-0 to open port 29500 ───────────────────
                      # Uses bash /dev/tcp builtin — no nc/curl required in image.
                      # FIX: replaces 'nc -z' which is not present in the sglang
                      # ROCm image and caused rank-1 to loop indefinitely.
                      if [ "$NODE_RANK" != "0" ]; then
                        echo "[INFO] Rank $NODE_RANK waiting for master at $MASTER_DNS:$MASTER_PORT ..."
                        until timeout 3 bash -c \
                          "echo > /dev/tcp/${MASTER_DNS}/${MASTER_PORT}" 2>/dev/null; do
                          echo "[WAITING] $(date -u +'%Y-%m-%dT%H:%M:%SZ') master port not ready..."
                          sleep 3
                        done
                        echo "[SUCCESS] Master port is reachable, starting SGLang..."
                      fi

                      # ── Launch SGLang multi-node decode ──────────────────────
                      python3 -m sglang.launch_server \
                        --model-path /models/Llama-3.2-1B-Instruct \
                        --served-model-name Llama-3.2-1B-Instruct \
                        --host 0.0.0.0 \
                        --port 30000 \
                        --disaggregation-mode decode \
                        --disaggregation-transfer-backend mooncake \
                        --dtype bfloat16 \
                        --trust-remote-code \
                        --tp-size 2 \
                        --nnodes 2 \
                        --node-rank $NODE_RANK \
                        --dist-init-addr ${MASTER_DNS}:${MASTER_PORT} \
                        --mem-fraction-static 0.8 \
                        --log-level debug

                  env:
                    # ── Networking ────────────────────────────────────────────
                    - name: NCCL_SOCKET_IFNAME
                      value: eth0
                    - name: GLOO_SOCKET_IFNAME
                      value: eth0
                    - name: NCCL_IB_DISABLE
                      value: "1"    # Ethernet only — disable InfiniBand
                    - name: NCCL_DEBUG
                      value: "INFO" # Remove once multi-node TP is confirmed stable

                    # ── MI300X ROCm performance flags ─────────────────────────
                    - name: HSA_NO_SCRATCH_RECLAIM
                      value: "1"
                    - name: GPU_FORCE_BLIT_COPY_SIZE
                      value: "6"
                    - name: HIP_FORCE_DEV_KERNARG
                      value: "1"
                    - name: TORCH_BLAS_PREFER_HIPBLASLT
                      value: "1"

                  volumeMounts:
                    - name: model-vol
                      mountPath: /models
                      readOnly: true
                    - name: shared-mem
                      mountPath: /dev/shm

                  resources:
                    limits:
                      amd.com/gpu: 1

                  securityContext:
                    capabilities:
                      add:
                        - IPC_LOCK
                        - SYS_ADMIN
                        - SYS_PTRACE
                        # SYS_PTRACE: verify this is required for mooncake KV
                        # transfer on decode side, remove if only added for debugging

              volumes:
                - name: model-vol
                  hostPath:
                    path: /data01/models
                    type: Directory
                - name: shared-mem
                  emptyDir:
                    medium: Memory