                      --log-level info
                env:
                  - name: MY_POD_IP
                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  - name: GLOO_SOCKET_IFNAME
                    value: eth0
                  - name: NCCL_SOCKET_IFNAME
                    value: eth0
                  - name: NCCL_IB_DISABLE
                    value: "0"
                  - name: NCCL_IB_GID_INDEX
                    value: "7"
                  - name: NCCL_DEBUG
                    value: "WARN"
                  - name: UCX_TLS
                    value: ^gga
                  - name: PYTORCH_ROCM_ARCH
                    value: "gfx942"
                  - name: HSA_NO_SCRATCH_RECLAIM
                    value: "1"
                  - name: GPU_FORCE_BLIT_COPY_SIZE
                    value: "6"
                  - name: HIP_FORCE_DEV_KERNARG
                    value: "1"
                  - name: TORCH_BLAS_PREFER_HIPBLASLT
                    value: "1"
                ports:
                  - containerPort: 6379
                    name: gcs-server
                  - containerPort: 8265
                    name: dashboard
                  - containerPort: 10001
                    name: client
                  - containerPort: 30000
