                    - name: GPU_FORCE_BLIT_COPY_SIZE
                      value: "6"
                    - name: HIP_FORCE_DEV_KERNARG
                      value: "1"
                    - name: TORCH_BLAS_PREFER_HIPBLASLT
                      value: "1"

                  lifecycle:
                    preStop:
                      exec:
                        command: ["/bin/sh", "-c", "ray stop"]

                  resources:
                    limits:
                      cpu: "4"
