# ================================================================
# RayClusterFleet: TP=2 + P/D Disaggregation
# Model: deepseek-ai/DeepSeek-R1-Distill-Llama-70B (~140GB)
#
# Node layout (1x AMD MI300X per node):
#   main              → head pod         (prefill rank 0)
#   eight-node        → prefill-worker   (prefill rank 1)
#   thirthteen-node   → decode-worker-0  (decode  rank 0)
#   fourthteen-node   → decode-worker-1  (decode  rank 1)
#
# Prefill group: main + eight-node        (tp=2, one model copy)
# Decode  group: thirthteen + fourthteen  (tp=2, one model copy)
#
# Router: standalone pod on main, points to real service IPs
#
# Model auto-downloads from HuggingFace on first start.
# Each node needs ~140GB free in /data01/models/
# ================================================================

---
# Headless service: decode-worker-1 resolves decode-worker-0 via DNS
apiVersion: v1
kind: Service
metadata:
  name: deepseek-decode-headless
  namespace: default
spec:
  clusterIP: None
  selector:
    ray-worker-group: decode-worker-0
  ports:
    - port: 5001
      name: dist-init

---
# Stable ClusterIP service pointing at prefill (head pod)
apiVersion: v1
kind: Service
metadata:
  name: deepseek-prefill-svc
  namespace: default
spec:
  selector:
    ray-node-type: head
    model.aibrix.ai/name: deepseek-r1-70b
  ports:
    - name: prefill
      port: 30000
      targetPort: 30000

---
# Stable ClusterIP service pointing at decode-worker-0
apiVersion: v1
kind: Service
metadata:
  name: deepseek-decode-svc
  namespace: default
spec:
  selector:
    ray-worker-group: decode-worker-0
  ports:
    - name: decode
      port: 30001
      targetPort: 30001

---
# Standalone router pod — routes prefill/decode across nodes
apiVersion: v1
kind: Pod
metadata:
  name: deepseek-pd-router
  namespace: default
  labels:
    app: deepseek-pd-router
    model.aibrix.ai/name: deepseek-r1-70b
    model.aibrix.ai/port: "8000"
spec:
  nodeSelector:
    kubernetes.io/hostname: main
  containers:
    - name: router
      image: aibrix/sglang-router:v0.1.6
      command: ["sh", "-c"]
      args:
        - |
          echo "[INFO] Waiting for prefill service..." &&
          until curl --max-time 5 --fail --silent http://deepseek-prefill-svc.default.svc.cluster.local:30000/health > /dev/null 2>&1; do
            echo "[WAIT] prefill not ready..."; sleep 10;
          done &&
          echo "[OK] prefill ready" &&

          echo "[INFO] Waiting for decode service..." &&
          until curl --max-time 5 --fail --silent http://deepseek-decode-svc.default.svc.cluster.local:30001/health > /dev/null 2>&1; do
            echo "[WAIT] decode not ready..."; sleep 10;
          done &&
          echo "[OK] decode ready" &&

          python3 -m sglang_router.launch_router \
            --pd-disaggregation \
            --policy random \
            --prefill http://deepseek-prefill-svc.default.svc.cluster.local:30000 9999 \
            --decode http://deepseek-decode-svc.default.svc.cluster.local:30001 \
            --host 0.0.0.0 \
            --port 8000
      ports:
        - containerPort: 8000
          name: serve
      resources:
        limits:
          cpu: "2"
          memory: "4Gi"
        requests:
          cpu: "1"
          memory: "2Gi"

---
apiVersion: orchestration.aibrix.ai/v1alpha1
kind: RayClusterFleet
metadata:
  name: deepseek-r1-70b-pd-tp
  labels:
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      model.aibrix.ai/name: deepseek-r1-70b
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        model.aibrix.ai/name: deepseek-r1-70b
      annotations:
        ray.io/overwrite-container-cmd: "true"
    spec:
      rayVersion: "2.10.0"

      # ── main → prefill rank 0 ──────────────────────────────────
      headGroupSpec:
        rayStartParams:
          dashboard-host: "0.0.0.0"
          num-cpus: "4"
          num-gpus: "1"
        template:
          metadata:
            labels:
              model.aibrix.ai/name: deepseek-r1-70b
              ray-node-type: head
          spec:
            nodeSelector:
              kubernetes.io/hostname: main
            containers:
              - name: ray-head
                image: lmsysorg/sglang:v0.5.8-rocm700-mi30x
                command: ["/bin/bash", "-lc", "--"]
                args:
                  - >
                    ulimit -n 65536 &&

                    ray start --head \
                      --num-cpus=4 \
                      --num-gpus=1 \
                      --dashboard-host=0.0.0.0 \
                      --metrics-export-port=8080 \
                      --dashboard-agent-listen-port=52365 &&

                    until curl --max-time 5 --fail http://127.0.0.1:8265 > /dev/null 2>&1; do
                      sleep 2;
                    done &&
                    echo "[OK] Ray dashboard ready" &&

                    until python3 -c "import ray; ray.init(address='auto', ignore_reinit_error=True); assert ray.cluster_resources().get('GPU',0) >= 4" 2>/dev/null; do
                      echo "[WAIT] Waiting for all 4 GPUs..."; sleep 5;
                    done &&
                    echo "[OK] All 4 GPUs ready" &&

                    python3 -m sglang.launch_server \
                      --model-path deepseek-ai/DeepSeek-R1-Distill-Llama-70B \
                      --served-model-name deepseek-r1-70b \
                      --host 0.0.0.0 \
                      --port 30000 \
                      --disaggregation-mode prefill \
                      --disaggregation-transfer-backend mooncake \
                      --tp-size 2 \
                      --nnodes 2 \
                      --node-rank 0 \
                      --dist-init-addr $MY_POD_IP:5000 \
                      --trust-remote-code \
                      --mem-fraction-static 0.8 \
