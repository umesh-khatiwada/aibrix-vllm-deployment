---
# External service — points at the standalone router pod
apiVersion: v1
kind: Service
metadata:
  name: deepseek-r1-70b
  namespace: default
  labels:
    model.aibrix.ai/name: deepseek-r1-70b
    prometheus-discovery: "true"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  selector:
    app: deepseek-pd-router
  ports:
    - name: serve
      port: 8000
      targetPort: 8000

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: deepseek-r1-70b-route
  namespace: aibrix-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: aibrix-eg
      namespace: aibrix-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: deepseek-r1-70b
          namespace: default
          port: 8000
          weight: 1
      matches:
        - headers:
            - name: model
              type: Exact
              value: deepseek-r1-70b
          path:
            type: PathPrefix
            value: /v1/chat/completions
        - headers:
            - name: model
              type: Exact
              value: deepseek-r1-70b
          path:
            type: PathPrefix
            value: /v1/completions
      timeouts:
        request: 300s