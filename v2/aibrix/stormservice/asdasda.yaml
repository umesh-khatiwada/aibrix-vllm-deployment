apiVersion: v1
kind: Service
metadata:
  name: deepseek-70b-pd-tp
  namespace: default
  labels:
    model.aibrix.ai/name: deepseek-70b
    prometheus-discovery: "true"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  selector:
    model.aibrix.ai/name: deepseek-70b
  ports:
    - name: serve       # router entry point
      port: 8000
      targetPort: 8000
    - name: runtime     # aibrix runtime metrics
      port: 8080
      targetPort: 8080

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: deepseek-70b-pd-tp-route
  namespace: aibrix-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: aibrix-eg
      namespace: aibrix-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: deepseek-70b-pd-tp
          namespace: default
          port: 8000
          weight: 1
      matches:
        - headers:
            - name: model
              type: Exact
              value: deepseek-70b
          path:
            type: PathPrefix
            value: /v1/chat/completions
        - headers:
            - name: model
              type: Exact
              value: deepseek-70b
          path:
            type: PathPrefix
            value: /v1/completions
      timeouts:
        request: 300s

# ================================================================
# IMPORTANT CAVEAT
#
# The decode worker IP resolution (DECODE_HEAD_IP) is the hardest
# part of this setup. Worker pods don't know each other's IPs at
# startup. You have two options:
#
# Option 1: Use a headless Service per worker group so pods can
#           resolve each other by DNS name.
#
# Option 2: Use an init container that waits for the decode-worker-0
#           pod IP to be available via the Kubernetes API before
#           starting the decode-worker-1 process.
#
# This is exactly the coordination gap that StormService solves
# for single-GPU pods via stable pod indexes. For multi-node,
# this coordination needs to be handled manually or via Ray's
# own node discovery (which is why Ray is useful here).
# ================================================================


# ================================================================
# RayClusterFleet: TP + P/D Disaggregation
#
# Node layout (1 GPU per node, AMD MI300X):
#   main           → head pod        (prefill rank 0)
#   eight-node     → prefill-worker  (prefill rank 1)
#   thirthteen-node  → decode-worker-0 (decode  rank 0)
#   fourthteen-node  → decode-worker-1 (decode  rank 1)
#
# PREREQS:
#   - KubeRay operator installed
#   - AIBrix operator installed
#   - RDMA networking between nodes
#   - Model weights at /data01/models on each node
# ================================================================

---
# Headless service so decode-worker-1 can resolve
# decode-worker-0 by DNS instead of hardcoded IP.
apiVersion: v1
kind: Service
metadata:
  name: deepseek-decode-headless
  namespace: default
spec:
  clusterIP: None
  selector:
    ray-worker-group: decode-worker-0
  ports:
    - port: 5001
      name: dist-init

---
apiVersion: orchestration.aibrix.ai/v1alpha1
kind: RayClusterFleet
