                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  # Cache downloaded model to local disk
                  - name: HF_HOME
                    value: /data01/hf-cache
                  - name: HUGGINGFACE_HUB_CACHE
                    value: /data01/hf-cache
                  # Networking
                  - name: GLOO_SOCKET_IFNAME
                    value: eth0
                  - name: NCCL_SOCKET_IFNAME
                    value: eth0
                  - name: NCCL_IB_DISABLE
                    value: "0"
                  - name: NCCL_IB_GID_INDEX
                    value: "7"
                  - name: NCCL_DEBUG
                    value: "WARN"
                  - name: UCX_TLS
                    value: ^gga
                  # MI300X ROCm
                  - name: PYTORCH_ROCM_ARCH
                    value: "gfx942"
                  - name: HSA_NO_SCRATCH_RECLAIM
                    value: "1"
                  - name: GPU_FORCE_BLIT_COPY_SIZE
                    value: "6"
                  - name: HIP_FORCE_DEV_KERNARG
                    value: "1"
                  - name: TORCH_BLAS_PREFER_HIPBLASLT
                    value: "1"
                ports:
                  - containerPort: 6379
                    name: gcs-server
                  - containerPort: 8265
                    name: dashboard
                  - containerPort: 10001
                    name: client
                  - containerPort: 30000
                    name: prefill
                resources:
                  limits:
                    cpu: "4"
                    amd.com/gpu: 1
                  requests:
                    cpu: "4"
                    amd.com/gpu: 1
                volumeMounts:
                  - name: model-cache
                    mountPath: /data01/hf-cache
                  - name: shared-mem
                    mountPath: /dev/shm
                  - name: dev-kfd
                    mountPath: /dev/kfd
                  - name: dev-dri
                    mountPath: /dev/dri

            volumes:
              - name: model-cache
                hostPath:
                  path: /data01/hf-cache
                  type: DirectoryOrCreate
              - name: shared-mem
                emptyDir:
                  medium: Memory
                  sizeLimit: 32Gi
              - name: dev-kfd
                hostPath:
                  path: /dev/kfd
              - name: dev-dri
                hostPath:
                  path: /dev/dri

      workerGroupSpecs:
        # ── eight-node → prefill rank 1 ───────────────────────────
        - groupName: prefill-worker
          replicas: 1
          minReplicas: 1
          maxReplicas: 1
          rayStartParams:
