                        --served-model-name deepseek-r1-70b \
                        --host 0.0.0.0 \
                        --port 30001 \
                        --disaggregation-mode decode \
                        --disaggregation-transfer-backend mooncake \
                        --tp-size 2 \
                        --nnodes 2 \
                        --node-rank 0 \
                        --dist-init-addr $MY_POD_IP:5001 \
                        --trust-remote-code \
