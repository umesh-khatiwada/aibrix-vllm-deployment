                      python3 -m sglang.launch_server \
                        --model-path deepseek-ai/DeepSeek-R1-Distill-Llama-70B \
                        --served-model-name deepseek-r1-70b \
                        --host 0.0.0.0 \
                        --port 30000 \
                        --disaggregation-mode prefill \
                        --disaggregation-transfer-backend mooncake \
                        --tp-size 2 \
                        --nnodes 2 \
                        --node-rank 1 \
                        --dist-init-addr deepseek-r1-70b-pd-tp-head-svc:5000 \
                        --trust-remote-code \
                        --mem-fraction-static 0.8 \
                        --log-level info
                  env:
                    - name: MY_POD_IP
                      valueFrom:
                        fieldRef:
                          fieldPath: status.podIP
                    - name: HF_HOME
                      value: /data01/hf-cache
                    - name: HUGGINGFACE_HUB_CACHE
