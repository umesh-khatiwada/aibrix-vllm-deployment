                    medium: Memory
                    sizeLimit: 32Gi
                - name: dev-kfd
                  hostPath:
                    path: /dev/kfd
                - name: dev-dri
                  hostPath:
                    path: /dev/dri

        # ── thirthteen-node → decode rank 0 ───────────────────────
        - groupName: decode-worker-0
          replicas: 1
          minReplicas: 1
