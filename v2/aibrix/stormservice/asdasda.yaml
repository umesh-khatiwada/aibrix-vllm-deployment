# ================================================================
# RayClusterFleet: TP + P/D Disaggregation
#
# Based on image 1 (right side): each RayCluster contains both
# prefill and decode nodes internally. Ray handles TP across nodes.
#
# Layout per RayCluster (4 GPUs total):
#   head node   → prefill  (1x MI300X, tp shard 0)
#   worker-1    → prefill  (1x MI300X, tp shard 1)  <- tp=2 for prefill
#   worker-2    → decode   (1x MI300X, tp shard 0)
#   worker-3    → decode   (1x MI300X, tp shard 1)  <- tp=2 for decode
#
# KV transfer: mooncake/nixl over RDMA between prefill and decode
#              nodes inside the same RayCluster
#
# PREREQS:
#   - KubeRay operator installed
#   - AIBrix operator installed
#   - RDMA networking between nodes
#   - Model weights at /data01/models on each node
#   - 1 GPU per node (AMD MI300X)
# ================================================================

---
apiVersion: orchestration.aibrix.ai/v1alpha1
kind: RayClusterFleet
metadata:
  name: deepseek-70b-pd-tp
  labels:
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/managed-by: kustomize
spec:
  # Each replica = one full RayCluster with prefill + decode inside.
  # Scale this to add more independent P/D instances.
  replicas: 1

  selector:
    matchLabels:
      model.aibrix.ai/name: deepseek-70b

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # never take down a cluster during update

  template:
    metadata:
      labels:
        model.aibrix.ai/name: deepseek-70b
      annotations:
        ray.io/overwrite-container-cmd: "true"

    spec:
      rayVersion: "2.10.0"

      # ── Head node: prefill shard 0 ────────────────────────────
      # Runs the Ray GCS + SGLang prefill server.
      # Acts as rank 0 of the prefill TP group.
      # Also runs the sglang-router as a sidecar to handle
      # P/D routing between prefill and decode within this cluster.
      headGroupSpec:
        rayStartParams:
          dashboard-host: "0.0.0.0"
          num-cpus: "4"
          num-gpus: "1"

        template:
          metadata:
            labels:
              model.aibrix.ai/name: deepseek-70b
              model.aibrix.ai/port: "8000"
              model.aibrix.ai/engine: sglang
          spec:
            containers:
              # ── SGLang prefill server (head) ─────────────────
              - name: ray-head
                image: aibrix/sglang:v0.4.9.post3-cu126-nixl-v0.4.1
                command: ["/bin/bash", "-lc", "--"]
                args:
                  - >
                    ulimit -n 65536 &&
                    pip3 install ray[default] &&

                    echo "[INFO] Starting Ray head..." &&
                    ray start --head \
                      --num-cpus=4 \
                      --num-gpus=1 \
                      --dashboard-host=0.0.0.0 \
                      --metrics-export-port=8080 \
                      --dashboard-agent-listen-port=52365 &&

                    echo "[INFO] Waiting for Ray dashboard..." &&
                    until curl --max-time 5 --fail http://127.0.0.1:8265 > /dev/null 2>&1; do
                      sleep 2;
                    done &&

                    echo "[INFO] Waiting for all 4 nodes to join (tp=2 prefill + tp=2 decode)..." &&
                    until python3 -c "
                    import ray; ray.init(address='auto', ignore_reinit_error=True)
                    gpus = ray.cluster_resources().get('GPU', 0)
                    assert gpus >= 4, f'Need 4 GPUs, have {gpus}'
                    print(f'[OK] {gpus} GPUs ready')
                    " 2>/dev/null; do
                      sleep 5;
                    done &&

                    echo "[INFO] Starting SGLang prefill server (tp=2, nnodes=2)..." &&
                    python3 -m sglang.launch_server \
                      --model-path /models/DeepSeek-70B \
                      --served-model-name deepseek-70b \
                      --host 0.0.0.0 \
                      --port 30000 \
                      --disaggregation-mode prefill \
                      --disaggregation-transfer-backend nixl \
                      --tp-size 2 \
                      --nnodes 2 \
                      --node-rank 0 \
                      --dist-init-addr $MY_POD_IP:5000 \
                      --trust-remote-code \
                      --mem-fraction-static 0.8 \
                      --log-level info

                env:
                  - name: MY_POD_IP
                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  - name: GLOO_SOCKET_IFNAME
                    value: eth0
                  - name: NCCL_SOCKET_IFNAME
                    value: eth0
                  - name: NCCL_IB_DISABLE
                    value: "0"
                  - name: NCCL_IB_GID_INDEX
                    value: "7"
                  - name: NCCL_DEBUG
                    value: "WARN"
                  - name: UCX_TLS
                    value: ^gga
                  - name: PYTORCH_ROCM_ARCH
                    value: "gfx942"
                  - name: HSA_NO_SCRATCH_RECLAIM
                    value: "1"
                  - name: GPU_FORCE_BLIT_COPY_SIZE
                    value: "6"
                  - name: HIP_FORCE_DEV_KERNARG
                    value: "1"
                  - name: TORCH_BLAS_PREFER_HIPBLASLT
                    value: "1"

                ports:
                  - containerPort: 6379
                    name: gcs-server
                  - containerPort: 8265
                    name: dashboard
                  - containerPort: 10001
                    name: client
                  - containerPort: 30000
                    name: prefill

                resources:
                  limits:
                    cpu: "4"
                    amd.com/gpu: 1
                  requests:
                    cpu: "4"
                    amd.com/gpu: 1

                volumeMounts:
                  - name: model-vol
                    mountPath: /models
                    readOnly: true
                  - name: shared-mem
                    mountPath: /dev/shm
                  - name: dev-kfd
                    mountPath: /dev/kfd
                  - name: dev-dri
                    mountPath: /dev/dri

              # ── sglang-router sidecar ─────────────────────────
              # Routes requests to prefill or decode within
              # this RayCluster. Exposes port 8000 as the
              # single entry point for this cluster instance.
              - name: router
                image: aibrix/sglang-router:v0.1.6
                command: ["sh", "-c"]
                args:
                  - |
                    python3 -m sglang_router.launch_router \
                      --pd-disaggregation \
                      --policy random \
                      --prefill-url http://localhost:30000 \
                      --decode-url http://localhost:30001 \
                      --host 0.0.0.0 \
                      --port 8000
                ports:
                  - containerPort: 8000
                    name: serve
                resources:
                  limits:
                    cpu: "2"
                    memory: "4Gi"
                  requests:
                    cpu: "1"
                    memory: "2Gi"

              # ── AIBrix runtime sidecar ────────────────────────
              - name: aibrix-runtime
                image: aibrix/runtime:v0.6.0
                command:
                  - aibrix_runtime
                  - --port
                  - "8080"
                env:
                  - name: INFERENCE_ENGINE
                    value: sglang
                  - name: INFERENCE_ENGINE_ENDPOINT
                    value: http://localhost:8000
                  - name: PYTORCH_ROCM_ARCH
                    value: "gfx942"
                ports:
                  - containerPort: 8080
                    protocol: TCP
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 3
                  periodSeconds: 2
                readinessProbe:
                  httpGet:
                    path: /ready
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: "1"
                  requests:
                    cpu: "1"

            volumes:
              - name: model-vol
                hostPath:
                  path: /data01/models
                  type: Directory
              - name: shared-mem
                emptyDir:
                  medium: Memory
                  sizeLimit: 32Gi
              - name: dev-kfd
                hostPath:
                  path: /dev/kfd
              - name: dev-dri
                hostPath:
                  path: /dev/dri

      workerGroupSpecs:
        # ── Worker group 1: prefill shard 1 ───────────────────
        - groupName: prefill-worker
          replicas: 1
          minReplicas: 1
          maxReplicas: 1
          rayStartParams:
            num-cpus: "4"
            num-gpus: "1"
          template:
            spec:
              containers:
                - name: prefill-worker
                  image: aibrix/sglang:v0.4.9.post3-cu126-nixl-v0.4.1
                  command: ["/bin/bash", "-lc", "--"]
                  args:
                    - >
                      ulimit -n 65536 &&
                      sleep 10 &&
                      eval "$KUBERAY_GEN_RAY_START_CMD --node-ip-address=$MY_POD_IP" &&

                      echo "[INFO] Starting SGLang prefill worker (tp=2, node rank 1)..." &&
                      python3 -m sglang.launch_server \
                        --model-path /models/DeepSeek-70B \
                        --served-model-name deepseek-70b \
                        --host 0.0.0.0 \
                        --port 30000 \
                        --disaggregation-mode prefill \
                        --disaggregation-transfer-backend nixl \
                        --tp-size 2 \
                        --nnodes 2 \
                        --node-rank 1 \
                        --dist-init-addr $HEAD_POD_IP:5000 \
                        --trust-remote-code \
                        --mem-fraction-static 0.8 \
                        --log-level info

                  env:
                    - name: MY_POD_IP
                      valueFrom:
                        fieldRef:
                          fieldPath: status.podIP
                    - name: HEAD_POD_IP
                      valueFrom:
                        fieldRef:
                          fieldPath: status.hostIP   # adjust based on your cluster DNS
                    - name: GLOO_SOCKET_IFNAME
                      value: eth0
                    - name: NCCL_SOCKET_IFNAME
                      value: eth0
                    - name: NCCL_IB_DISABLE
                      value: "0"
                    - name: NCCL_IB_GID_INDEX
                      value: "7"
                    - name: PYTORCH_ROCM_ARCH
                      value: "gfx942"
                    - name: HSA_NO_SCRATCH_RECLAIM
                      value: "1"
                    - name: GPU_FORCE_BLIT_COPY_SIZE
                      value: "6"
                    - name: HIP_FORCE_DEV_KERNARG
                      value: "1"
                    - name: TORCH_BLAS_PREFER_HIPBLASLT
                      value: "1"

                  lifecycle:
                    preStop:
                      exec:
                        command: ["/bin/sh", "-c", "ray stop"]

                  resources:
                    limits:
                      cpu: "4"
                      amd.com/gpu: 1
                    requests:
                      cpu: "4"
                      amd.com/gpu: 1

                  volumeMounts:
                    - name: model-vol
                      mountPath: /models
                      readOnly: true
                    - name: shared-mem
                      mountPath: /dev/shm
                    - name: dev-kfd
                      mountPath: /dev/kfd
                    - name: dev-dri
                      mountPath: /dev/dri

              volumes:
                - name: model-vol
                  hostPath:
                    path: /data01/models
                    type: Directory
                - name: shared-mem
                  emptyDir:
                    medium: Memory
                    sizeLimit: 32Gi
                - name: dev-kfd
                  hostPath:
                    path: /dev/kfd
                - name: dev-dri
                  hostPath:
                    path: /dev/dri

        # ── Worker group 2: decode shard 0 ────────────────────
        - groupName: decode-worker-0
          replicas: 1
          minReplicas: 1
          maxReplicas: 1
          rayStartParams:
            num-cpus: "4"
            num-gpus: "1"
          template:
            spec:
              containers:
                - name: decode-worker-0
                  image: aibrix/sglang:v0.4.9.post3-cu126-nixl-v0.4.1
                  command: ["/bin/bash", "-lc", "--"]
                  args:
                    - >
                      ulimit -n 65536 &&
                      sleep 10 &&
                      eval "$KUBERAY_GEN_RAY_START_CMD --node-ip-address=$MY_POD_IP" &&

                      echo "[INFO] Starting SGLang decode server (tp=2, node rank 0)..." &&
                      python3 -m sglang.launch_server \
                        --model-path /models/DeepSeek-70B \
                        --served-model-name deepseek-70b \
                        --host 0.0.0.0 \
                        --port 30001 \
                        --disaggregation-mode decode \
                        --disaggregation-transfer-backend nixl \
                        --tp-size 2 \
                        --nnodes 2 \
                        --node-rank 0 \
                        --dist-init-addr $MY_POD_IP:5001 \
                        --trust-remote-code \
                        --mem-fraction-static 0.8 \
                        --log-level info

                  env:
                    - name: MY_POD_IP
                      valueFrom:
                        fieldRef:
                          fieldPath: status.podIP
                    - name: GLOO_SOCKET_IFNAME
                      value: eth0
                    - name: NCCL_SOCKET_IFNAME
                      value: eth0
                    - name: NCCL_IB_DISABLE
                      value: "0"
                    - name: NCCL_IB_GID_INDEX
                      value: "7"
                    - name: PYTORCH_ROCM_ARCH
                      value: "gfx942"
                    - name: HSA_NO_SCRATCH_RECLAIM
                      value: "1"
                    - name: GPU_FORCE_BLIT_COPY_SIZE
                      value: "6"
                    - name: HIP_FORCE_DEV_KERNARG
                      value: "1"
                    - name: TORCH_BLAS_PREFER_HIPBLASLT
                      value: "1"

                  lifecycle:
                    preStop:
                      exec:
                        command: ["/bin/sh", "-c", "ray stop"]

                  resources:
                    limits:
                      cpu: "4"
                      amd.com/gpu: 1
                    requests:
                      cpu: "4"
                      amd.com/gpu: 1

                  volumeMounts:
                    - name: model-vol
                      mountPath: /models
                      readOnly: true
                    - name: shared-mem
                      mountPath: /dev/shm
                    - name: dev-kfd
                      mountPath: /dev/kfd
                    - name: dev-dri
                      mountPath: /dev/dri

              volumes:
                - name: model-vol
                  hostPath:
                    path: /data01/models
                    type: Directory
                - name: shared-mem
                  emptyDir:
                    medium: Memory
                    sizeLimit: 32Gi
                - name: dev-kfd
                  hostPath:
                    path: /dev/kfd
                - name: dev-dri
                  hostPath:
                    path: /dev/dri

        # ── Worker group 3: decode shard 1 ────────────────────
        - groupName: decode-worker-1
          replicas: 1
          minReplicas: 1
          maxReplicas: 1
          rayStartParams:
            num-cpus: "4"
            num-gpus: "1"
          template:
            spec:
              containers:
                - name: decode-worker-1
                  image: aibrix/sglang:v0.4.9.post3-cu126-nixl-v0.4.1
                  command: ["/bin/bash", "-lc", "--"]
                  args:
                    - >
                      ulimit -n 65536 &&
                      sleep 10 &&
                      eval "$KUBERAY_GEN_RAY_START_CMD --node-ip-address=$MY_POD_IP" &&

                      echo "[INFO] Starting SGLang decode worker (tp=2, node rank 1)..." &&
                      python3 -m sglang.launch_server \
                        --model-path /models/DeepSeek-70B \
                        --served-model-name deepseek-70b \
                        --host 0.0.0.0 \
                        --port 30001 \
                        --disaggregation-mode decode \
                        --disaggregation-transfer-backend nixl \
                        --tp-size 2 \
                        --nnodes 2 \
                        --node-rank 1 \
                        --dist-init-addr $DECODE_HEAD_IP:5001 \
                        --trust-remote-code \
                        --mem-fraction-static 0.8 \
                        --log-level info

                  env:
                    - name: MY_POD_IP
                      valueFrom:
                        fieldRef:
                          fieldPath: status.podIP
                    - name: DECODE_HEAD_IP   # IP of decode-worker-0, needs to be resolved
                      value: "$(DECODE_WORKER_0_IP)"
                    - name: GLOO_SOCKET_IFNAME
                      value: eth0
                    - name: NCCL_SOCKET_IFNAME
                      value: eth0
                    - name: NCCL_IB_DISABLE
                      value: "0"
                    - name: NCCL_IB_GID_INDEX
                      value: "7"
                    - name: PYTORCH_ROCM_ARCH
